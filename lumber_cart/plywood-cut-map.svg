<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3d3d3d" />
    </marker>
    <style>
      .sheet  { fill: #f4efe2; stroke: #333; stroke-width: 3; }
      .part-a { fill: #d7c4a3; stroke: #444; stroke-width: 2; }
      .part-b { fill: #c8d8c3; stroke: #444; stroke-width: 2; }
      .part-c { fill: #c7d7e8; stroke: #444; stroke-width: 2; }
      .part-d { fill: #d5c5e8; stroke: #444; stroke-width: 2; }
      .part-e { fill: #f4c8a0; stroke: #444; stroke-width: 2; }
      .offcut { fill: #f0f0f0; stroke: #999; stroke-width: 2; stroke-dasharray: 8 6; }
      .cutline { stroke: #555; stroke-width: 2; }
      .dim  { stroke: #3d3d3d; stroke-width: 1.5; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
      .title { font: 28px Arial, sans-serif; font-weight: bold; fill: #222; }
      .text  { font: 18px Arial, sans-serif; fill: #222; }
      .small { font: 15px Arial, sans-serif; fill: #444; }
      .bold  { font: 18px Arial, sans-serif; font-weight: bold; fill: #111; }
    </style>
  </defs>

  <!-- Title -->
  <text x="60" y="42" class="title">One-Sheet Plywood Cut Map</text>
  <text x="60" y="68" class="small">Sheet: 48 in × 96 in. Scale: 10 px = 1 in.</text>
  <text x="60" y="86" class="small">Floor panel is full-width (48×18); all other panels sit on top of it.</text>

  <!-- Sheet outline: 480px wide × 960px tall, origin (100, 100) -->
  <rect x="100" y="100" width="480" height="960" class="sheet" />

  <!--
    Layout (10 px = 1 in):
      Back panel:    y=100   h=305   (30-1/2") full width
      Floor panel:   y=405   h=180   (18")      full width
      Middle sect:   y=585   h=435   (43-1/2")
        Strip B:     x=100   w=305   (30-1/2")
          Blank 1:   y=585   h=110   (11")
          Blank 2:   y=695   h=110   (11")
          Blank 3:   y=805   h=110   (11")
          Ret 1:     y=915   h=40    (4")   22-7/8 wide
          Ret 2:     y=955   h=40    (4")   22-7/8 wide
          Scrap:     y=995   h=25    (2-1/2") leftover
        Strip C:     x=405   w=175   (17-1/2") spare
      Back retainer: y=1020  h=40    (4")       full width
  -->

  <!-- ═══ CUT LINES ═══ -->
  <!-- Cut 1: crosscut 30-1/2" from top -->
  <line x1="100" y1="405" x2="580" y2="405" class="cutline" />
  <!-- Cut 2: crosscut 18" below back panel (floor panel) -->
  <line x1="100" y1="585" x2="580" y2="585" class="cutline" />
  <!-- Cut 3: crosscut 4" from bottom (back retainer) -->
  <line x1="100" y1="1020" x2="580" y2="1020" class="cutline" />
  <!-- Cut 4: rip 30-1/2" strip from middle section (x=405) -->
  <line x1="405" y1="585" x2="405" y2="1020" class="cutline" />
  <!-- Cuts 5a-c: side blank crosscuts every 11" in Strip B -->
  <line x1="100" y1="695" x2="405" y2="695" class="cutline" />
  <line x1="100" y1="805" x2="405" y2="805" class="cutline" />
  <line x1="100" y1="915" x2="405" y2="915" class="cutline" />
  <!-- Cuts 6a-b: front retainers, 4" tall each — stacked in Strip B -->
  <line x1="100" y1="955" x2="405" y2="955" class="cutline" />
  <line x1="100" y1="995" x2="405" y2="995" class="cutline" />
  <!-- Rip retainer blanks to 22-7/8" (dashed — done at table saw) -->
  <line x1="329" y1="915" x2="329" y2="995" class="cutline" stroke-dasharray="6 4" />

  <!-- ═══ PART FILLS ═══ -->

  <!-- Back panel (green) — full width -->
  <rect x="100" y="100" width="480" height="305" class="part-b" />
  <text x="340" y="248" class="bold" text-anchor="middle">Back panel</text>
  <text x="340" y="272" class="small" text-anchor="middle">48 × 30-1/2</text>

  <!-- Floor panel (blue) — full width -->
  <rect x="100" y="405" width="480" height="180" class="part-c" />
  <text x="340" y="491" class="bold" text-anchor="middle">Floor panel</text>
  <text x="340" y="515" class="small" text-anchor="middle">48 × 18  (covers entire 2×4 base frame)</text>

  <!-- Side / Divider blank 1 (tan) -->
  <rect x="100" y="585" width="305" height="110" class="part-a" />
  <text x="252" y="635" class="text" text-anchor="middle">Side / Divider blank</text>
  <text x="252" y="657" class="small" text-anchor="middle">30-1/2 × 11</text>

  <!-- Side / Divider blank 2 (tan) -->
  <rect x="100" y="695" width="305" height="110" class="part-a" />
  <text x="252" y="745" class="text" text-anchor="middle">Side / Divider blank</text>
  <text x="252" y="767" class="small" text-anchor="middle">30-1/2 × 11</text>

  <!-- Side / Divider blank 3 (tan) -->
  <rect x="100" y="805" width="305" height="110" class="part-a" />
  <text x="252" y="855" class="text" text-anchor="middle">Side / Divider blank</text>
  <text x="252" y="877" class="small" text-anchor="middle">30-1/2 × 11</text>

  <!-- Front retainer 1 (lavender) — 22-7/8 × 4 -->
  <rect x="100" y="915" width="229" height="40" class="part-d" />
  <text x="214" y="941" class="small" text-anchor="middle">Front ret. 22-7/8 × 4</text>
  <!-- Scrap beside retainer 1 -->
  <rect x="329" y="915" width="76" height="40" class="offcut" />
  <text x="367" y="939" class="small" text-anchor="middle">scrap</text>

  <!-- Front retainer 2 (lavender) -->
  <rect x="100" y="955" width="229" height="40" class="part-d" />
  <text x="214" y="981" class="small" text-anchor="middle">Front ret. 22-7/8 × 4</text>
  <!-- Scrap beside retainer 2 -->
  <rect x="329" y="955" width="76" height="40" class="offcut" />
  <text x="367" y="979" class="small" text-anchor="middle">scrap</text>

  <!-- Strip B tail scrap (2-1/2") -->
  <rect x="100" y="995" width="305" height="25" class="offcut" />
  <text x="252" y="1011" class="small" text-anchor="middle">Strip B scrap (~2-1/2")</text>

  <!-- Strip C — full height spare material -->
  <rect x="405" y="585" width="175" height="435" class="offcut" />
  <text x="492" y="780" class="text" text-anchor="middle">Strip C</text>
  <text x="492" y="802" class="small" text-anchor="middle">spare</text>
  <text x="492" y="822" class="small" text-anchor="middle">17-1/2 × 43-1/2</text>
  <text x="492" y="842" class="small" text-anchor="middle">(blocking, etc.)</text>

  <!-- Back retainer (orange) — full width -->
  <rect x="100" y="1020" width="480" height="40" class="part-e" />
  <text x="340" y="1046" class="bold" text-anchor="middle">Back retainer — 48 × 4</text>

  <!-- ═══ DIMENSION LINES ═══ -->

  <!-- Sheet width: 48 in -->
  <line x1="100" y1="75" x2="580" y2="75" class="dim" />
  <text x="340" y="69" class="text" text-anchor="middle">48</text>

  <!-- Sheet height: 96 in -->
  <line x1="60" y1="100" x2="60" y2="1060" class="dim" />
  <text x="47" y="580" transform="rotate(-90 47 580)" class="text" text-anchor="middle">96</text>

  <!-- Back panel height: 30-1/2 -->
  <line x1="600" y1="100" x2="600" y2="405" class="dim" />
  <text x="628" y="260" transform="rotate(-90 628 260)" class="small" text-anchor="middle">30-1/2</text>

  <!-- Floor panel height: 18 -->
  <line x1="600" y1="405" x2="600" y2="585" class="dim" />
  <text x="628" y="500" transform="rotate(-90 628 500)" class="small" text-anchor="middle">18</text>

  <!-- Middle section height: 43-1/2 -->
  <line x1="600" y1="585" x2="600" y2="1020" class="dim" />
  <text x="628" y="808" transform="rotate(-90 628 808)" class="small" text-anchor="middle">43-1/2</text>

  <!-- Back retainer height: 4 -->
  <line x1="600" y1="1020" x2="600" y2="1060" class="dim" />
  <text x="628" y="1046" transform="rotate(-90 628 1046)" class="small" text-anchor="middle">4</text>

  <!-- Side blank repeat: 11 -->
  <text x="414" y="646" class="small">11</text>
  <text x="414" y="756" class="small">11</text>
  <text x="414" y="866" class="small">11</text>

  <!-- Strip widths (below sheet) -->
  <line x1="100" y1="1082" x2="405" y2="1082" class="dim" />
  <text x="252" y="1100" class="small" text-anchor="middle">Strip B: 30-1/2</text>
  <line x1="405" y1="1082" x2="580" y2="1082" class="dim" />
  <text x="492" y="1100" class="small" text-anchor="middle">Strip C: 17-1/2</text>

  <!-- ═══ LEGEND ═══ -->
  <text x="630" y="120" class="bold">Legend</text>
  <rect x="630" y="130" width="18" height="14" class="part-b" />
  <text x="656" y="143" class="small">Back panel</text>
  <rect x="630" y="152" width="18" height="14" class="part-c" />
  <text x="656" y="165" class="small">Floor panel (full width)</text>
  <rect x="630" y="174" width="18" height="14" class="part-a" />
  <text x="656" y="187" class="small">Side / Divider blank (×3)</text>
  <rect x="630" y="196" width="18" height="14" class="part-d" />
  <text x="656" y="209" class="small">Front retainers (×2)</text>
  <rect x="630" y="218" width="18" height="14" class="part-e" />
  <text x="656" y="231" class="small">Back retainer (full width)</text>
  <rect x="630" y="240" width="18" height="14" class="offcut" />
  <text x="656" y="253" class="small">Scrap / offcut</text>

  <!-- ═══ CUT SEQUENCE ═══ -->
  <text x="630" y="294" class="bold">Cut sequence</text>
  <text x="630" y="316" class="small">1. Crosscut 30-1/2" from top</text>
  <text x="640" y="334" class="small">→ back panel (full width)</text>
  <text x="630" y="354" class="small">2. Crosscut 18" below that</text>
  <text x="640" y="372" class="small">→ floor panel (full width)</text>
  <text x="630" y="392" class="small">3. Crosscut 4" from bottom</text>
  <text x="640" y="410" class="small">→ back retainer (full width)</text>
  <text x="630" y="430" class="small">4. Rip 30-1/2" from middle strip</text>
  <text x="640" y="448" class="small">→ Strip B (43-1/2" long)</text>
  <text x="630" y="468" class="small">5. Crosscut ×3 @ 11" in Strip B</text>
  <text x="640" y="486" class="small">→ side / divider blanks</text>
  <text x="630" y="506" class="small">6. Cut 2 front retainers from</text>
  <text x="640" y="524" class="small">Strip B leftover:</text>
  <text x="640" y="542" class="small">two 4" crosscuts, then rip</text>
  <text x="640" y="560" class="small">each to 22-7/8" wide</text>
  <text x="630" y="580" class="small">Strip C (17-1/2×43-1/2) spare</text>
</svg>
